map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream art_gallery_app {
    server app:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name kavkazart.ru www.kavkazart.ru kavkazart.com www.kavkazart.com;

    location = /nginx-health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        return 301 https://kavkazart.ru$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name kavkazart.com www.kavkazart.com;

    ssl_certificate /etc/letsencrypt/live/kavkazart.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kavkazart.com/privkey.pem;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        return 301 https://kavkazart.ru$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name www.kavkazart.ru;

    ssl_certificate /etc/letsencrypt/live/kavkazart.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kavkazart.ru/privkey.pem;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        return 301 https://kavkazart.ru$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name kavkazart.ru;

    ssl_certificate /etc/letsencrypt/live/kavkazart.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kavkazart.ru/privkey.pem;

    client_max_body_size 10m;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        proxy_pass http://art_gallery_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
